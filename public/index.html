<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书云文档管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1::before {
            content: '📄';
            font-size: 2.5rem;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }

        .status-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
        }

        .status-icon.offline {
            background: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #667eea;
            font-size: 1.5rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .action-btn:active {
            transform: translateY(-1px);
        }

        .action-btn span {
            display: block;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        /* 文档列表样式 */
        .document-list {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        .document-item {
            background: #f8f9fa;
            border: 1px solid #e4e8ec;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .document-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .document-info {
            flex: 1;
        }

        .document-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .document-meta {
            display: flex;
            gap: 15px;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .document-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .download-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .api-section {
            margin-top: 30px;
        }

        .api-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-left: 4px solid #667eea;
        }

        .api-method {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 80px;
            text-align: center;
        }

        .api-method.get { background: #10b981; }
        .api-method.post { background: #3b82f6; }

        .api-path {
            font-family: 'Courier New', monospace;
            color: #4b5563;
        }

        .logs-section {
            margin-top: 20px;
        }

        .logs-container {
            background: #1f2937;
            color: #10b981;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #374151;
        }

        .log-timestamp {
            color: #9ca3af;
            margin-right: 10px;
        }

        .log-message {
            color: #d1d5db;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-left: 4px solid #10b981;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>飞书云文档管理系统</h1>
            <p class="subtitle">企业级文档管理与协作平台</p>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-icon" id="db-status"></div>
                    <span>数据库</span>
                </div>
                <div class="status-item">
                    <div class="status-icon" id="redis-status"></div>
                    <span>Redis</span>
                </div>
                <div class="status-item">
                    <div class="status-icon" id="feishu-status"></div>
                    <span>飞书API</span>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="card">
                <h2>🚀 快速操作</h2>
                <div class="quick-actions">
                    <button class="action-btn" onclick="checkHealth()">
                        <span>🏥</span>
                        系统健康检查
                    </button>
                    <button class="action-btn" onclick="listDocuments()">
                        <span>📁</span>
                        查看文档列表
                    </button>
                    <button class="action-btn" onclick="createDocument()">
                        <span>✨</span>
                        创建新文档
                    </button>
                    <button class="action-btn" onclick="listFolders()">
                        <span>📂</span>
                        文件夹管理
                    </button>
                    <a class="action-btn" href="/sheets.html" style="text-decoration: none;">
                        <span>📊</span>
                        电子表格管理
                    </a>
                </div>
            </div>

            <div class="card">
                <h2>📄 文档列表</h2>
                <div id="document-list" class="document-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📄</div>
                        <p>点击"查看文档列表"按钮加载文档</p>
                    </div>
                </div>
            </div>

            <div class="card logs-section">
                <h2>📜 请求日志</h2>
                <div class="logs-container" id="logs-container">
                    <div class="log-entry">
                        <span class="log-timestamp">[系统]</span>
                        <span class="log-message">等待您的第一个请求...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // 添加日志
        function addLog(message, type = 'info') {
            const container = document.getElementById('logs-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            entry.innerHTML = `
                <span class="log-timestamp">[${timestamp}]</span>
                <span class="log-message">${message}</span>
            `;
            
            container.insertBefore(entry, container.firstChild);
            
            if (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // 健康检查
        async function checkHealth() {
            addLog('正在进行系统健康检查...');
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                addLog(`健康检查完成: ${JSON.stringify(data)}`);
                showToast('系统健康！', 'success');
                
                document.getElementById('db-status').className = data.database ? 'status-icon' : 'status-icon offline';
                document.getElementById('redis-status').className = data.redis ? 'status-icon' : 'status-icon offline';
                document.getElementById('feishu-status').className = data.feishu ? 'status-icon' : 'status-icon offline';
                
            } catch (error) {
                addLog(`健康检查失败: ${error.message}`, 'error');
                showToast('系统异常！', 'error');
            }
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '未知';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }

        // 获取文档类型图标
        function getTypeIcon(type) {
            switch (type) {
                case 'docx': return '📝';
                case 'sheet': return '📊';
                case 'bitable': return '📋';
                default: return '📄';
            }
        }

        // 列出文档
        async function listDocuments() {
            addLog('正在获取文档列表...');
            try {
                const response = await fetch('/api/documents');
                const data = await response.json();
                
                addLog(`找到 ${data.length || 0} 个文档`);
                showToast('文档列表已更新！', 'success');
                
                const container = document.getElementById('document-list');
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>暂无文档，点击"创建新文档"开始使用</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.map(doc => `
                    <div class="document-item">
                        <div class="document-info">
                            <div class="document-title">
                                ${getTypeIcon(doc.type)} ${doc.title}
                            </div>
                            <div class="document-meta">
                                <span>📋 ID: ${doc.id}</span>
                                <span>👁️ ${doc.viewCount || 0} 次查看</span>
                                <span>📅 更新: ${formatDate(doc.updatedAt)}</span>
                            </div>
                        </div>
                        <button class="download-btn" onclick="downloadDocument(${doc.id})">
                            📥 下载文档
                        </button>
                    </div>
                `).join('');
                
            } catch (error) {
                addLog(`获取文档失败: ${error.message}`, 'error');
                showToast('获取文档失败！', 'error');
            }
        }

        // 下载文档
        async function downloadDocument(docId) {
            addLog(`正在下载文档 #${docId}...`);
            try {
                const response = await fetch(`/api/documents/${docId}/download`);
                
                if (!response.ok) {
                    throw new Error(`下载失败: ${response.status}`);
                }
                
                // 获取文件名
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = `document_${docId}.txt`;
                if (contentDisposition) {
                    const match = contentDisposition.match(/filename="?([^"]+)"?/);
                    if (match) filename = match[1];
                }
                
                // 下载文件
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                addLog(`文档 #${docId} 下载成功`);
                showToast('文档下载成功！', 'success');
                
            } catch (error) {
                addLog(`下载文档失败: ${error.message}`, 'error');
                showToast('下载文档失败！', 'error');
            }
        }

        // 创建文档
        async function createDocument() {
            addLog('正在创建新文档...');
            const title = prompt('请输入文档标题:');
            if (!title) {
                addLog('用户取消操作');
                return;
            }
            
            try {
                const response = await fetch('/api/documents', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        type: 'docx'
                    })
                });
                const data = await response.json();
                addLog(`文档创建成功: ${title}`);
                showToast('文档创建成功！', 'success');
                
                // 刷新文档列表
                await listDocuments();
                
            } catch (error) {
                addLog(`创建文档失败: ${error.message}`, 'error');
                showToast('创建文档失败！', 'error');
            }
        }

        // 列出文件夹
        async function listFolders() {
            addLog('正在获取文件夹列表...');
            try {
                const response = await fetch('/api/folders');
                const data = await response.json();
                addLog(`找到 ${data.length || 0} 个文件夹`);
                showToast('文件夹列表已更新！', 'success');
                console.log('文件夹列表:', data);
            } catch (error) {
                addLog(`获取文件夹失败: ${error.message}`, 'error');
                showToast('获取文件夹失败！', 'error');
            }
        }

        // 页面加载时自动检查健康并加载文档
        window.addEventListener('load', () => {
            addLog('页面加载完成，系统已就绪');
            checkHealth();
            // 自动加载文档列表
            setTimeout(() => listDocuments(), 500);
        });
    </script>
</body>
</html>
